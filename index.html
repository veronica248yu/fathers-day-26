<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Father's Day</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="garden">
    <!--
      The stage shows the static leaves/stems background. Each plant's
      close-cropped flower and vegetable images are positioned over it by
      script.js (coordinates measured from the reference composites). Hover a
      flower and it grows into its vegetable; hover the vegetable to revert.
      Add ?debug to the URL to outline the crop boxes.
    -->
    <div class="stage" id="stage">
      <img class="layer--base" src="assets/background.png" alt="Illustrated cucumber, pea, and tomato plants with leaves and stems" />
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
